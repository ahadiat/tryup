<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pembayaran Makan Malam Fakulti</title>

<style>

body{
  font-family:Arial;
  max-width:600px;
  margin:auto;
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button{
  padding:10px;
}

</style>

</head>

<body>

<h2>Pembayaran Makan Malam Fakulti</h2>

<input
id="matrik"
placeholder="No Matrik">

<button onclick="checkMatrik()">
Semak Nama
</button>

<input
id="nama"
readonly
placeholder="Nama Pelajar">

<input
type="file"
id="file">

<button onclick="submitData()">
Hantar
</button>

<div id="status"></div>

<script>

const WEBAPP =
"https://script.google.com/macros/s/AKfycbx8ZuvobYd72VNO71j5-wNowIDrU99ADqPKRK2o9jrDX7ZvkbFvtc7hJajig5dtOPDs/exec";

function checkMatrik(){

  const matrik =
    document
    .getElementById("matrik")
    .value;

  fetch(WEBAPP,{
    method:"POST",
    body:JSON.stringify({
      action:"searchStudent",
      matrik:matrik
    })
  })
  .then(r=>r.json())
  .then(data=>{

    if(data.found){

      document
      .getElementById("nama")
      .value =
      data.nama;

    }else{

      alert(
      "No Matrik tidak dijumpai"
      );
    }

  });

}

function submitData(){

  const file =
    document
    .getElementById("file")
    .files[0];

  const matrik =
    document
    .getElementById("matrik")
    .value;

  const nama =
    document
    .getElementById("nama")
    .value;

  if(!file){
    alert("Pilih fail");
    return;
  }

  const reader =
    new FileReader();

  reader.onload = function(e){

    const base64 =
      e.target.result
      .split(",")[1];

    fetch(WEBAPP,{
      method:"POST",
      body:JSON.stringify({

        action:"submit",

        matrik:matrik,

        nama:nama,

        fileData:base64,

        fileName:file.name,

        mimeType:file.type

      })
    })
    .then(r=>r.json())
    .then(data=>{

      document
      .getElementById("status")
      .innerHTML =
      "Berjaya dihantar";

    });

  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
